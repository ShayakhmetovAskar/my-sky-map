name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skymap_user
          POSTGRES_PASSWORD: skymap_password
          POSTGRES_DB: skymap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U skymap_user -d skymap_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/solver/requirements.txt

      - name: Run tests
        working-directory: services/solver
        env:
          DATABASE_URL: postgresql+asyncpg://skymap_user:skymap_password@localhost:5432/skymap_test
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: skymap
        run: python -m pytest tests/unit tests/scenario -v --tb=short
