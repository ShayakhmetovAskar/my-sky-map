apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skymap-api
  namespace: skymap
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: skymap.afsh.space
      http:
        paths:
          - path: /api/v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: solver-api
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skymap-auth
  namespace: skymap
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPCS"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - skymap-auth.afsh.space
      secretName: cloudflare-origin-tls
  rules:
    - host: skymap-auth.afsh.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zitadel
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skymap-playground
  namespace: skymap
spec:
  ingressClassName: nginx
  rules:
    - host: skymap-playground.afsh.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: playground
                port:
                  number: 80
