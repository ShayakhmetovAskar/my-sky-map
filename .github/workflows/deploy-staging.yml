name: Deploy to Staging

on:
  workflow_dispatch:

env:
  REGISTRY: cr.yandex/crpvlpmjteb6egojpc4g
  K8S_NAMESPACE: skymap
  K8S_CLUSTER_ID: cate1dh5sg9041khenvi

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skymap_user
          POSTGRES_PASSWORD: skymap_password
          POSTGRES_DB: skymap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U skymap_user -d skymap_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 15); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 2
          done
          curl -s -X PUT http://localhost:9000/skymap -u minioadmin:minioadmin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r services/solver/requirements.txt

      - name: Run tests
        working-directory: services/solver
        env:
          DATABASE_URL: postgresql+asyncpg://skymap_user:skymap_password@localhost:5432/skymap_test
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: skymap
        run: python -m pytest tests/unit tests/scenario -v --tb=short

  setup-k8s:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: ./.github/actions/setup-kubectl
        with:
          sa-key: ${{ secrets.YC_SA_KEY_JSON }}
          cluster-id: ${{ env.K8S_CLUSTER_ID }}

      - name: Apply shared manifests
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/configmap.yaml
          kubectl apply -f k8s/base/ingress.yaml

  deploy-backend:
    needs: setup-k8s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY_JSON }}

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/skymap-solver:${{ github.sha }} \
            -f services/solver/Dockerfile \
            services/solver/
          docker push ${{ env.REGISTRY }}/skymap-solver:${{ github.sha }}

      - name: Configure kubectl
        uses: ./.github/actions/setup-kubectl
        with:
          sa-key: ${{ secrets.YC_SA_KEY_JSON }}
          cluster-id: ${{ env.K8S_CLUSTER_ID }}

      - name: Deploy
        run: |
          kubectl apply -f k8s/base/postgres/ -f k8s/base/solver-api/ -f k8s/base/solver-worker/
          kubectl set image deployment/solver-api \
            solver-api=${{ env.REGISTRY }}/skymap-solver:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/solver-worker \
            solver-worker=${{ env.REGISTRY }}/skymap-solver:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/solver-api -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/solver-worker -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Verify
        run: |
          for i in $(seq 1 5); do
            curl -sf https://skymap.afsh.space/api/v1/healthcheck && exit 0
            sleep 5
          done
          exit 1

  deploy-playground:
    needs: setup-k8s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY_JSON }}

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/skymap-playground:${{ github.sha }} \
            -f frontend/playground/Dockerfile \
            frontend/playground/
          docker push ${{ env.REGISTRY }}/skymap-playground:${{ github.sha }}

      - name: Configure kubectl
        uses: ./.github/actions/setup-kubectl
        with:
          sa-key: ${{ secrets.YC_SA_KEY_JSON }}
          cluster-id: ${{ env.K8S_CLUSTER_ID }}

      - name: Deploy
        run: |
          kubectl apply -f k8s/base/playground/
          kubectl set image deployment/playground \
            playground=${{ env.REGISTRY }}/skymap-playground:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/playground -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Verify
        run: |
          for i in $(seq 1 5); do
            curl -sf https://skymap-playground.afsh.space/ && exit 0
            sleep 5
          done
          exit 1

  deploy-frontend:
    needs: setup-k8s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_KEY_JSON }}

      - name: Build and push
        run: |
          docker build \
            --build-arg VITE_ZITADEL_URL=https://skymap-auth.afsh.space \
            --build-arg VITE_ZITADEL_CLIENT_ID=${{ secrets.ZITADEL_FRONTEND_CLIENT_ID }} \
            --build-arg VITE_SOLVER_API_URL=https://skymap.afsh.space/api/v1 \
            -t ${{ env.REGISTRY }}/skymap-frontend:${{ github.sha }} \
            -f frontend/Dockerfile \
            frontend/
          docker push ${{ env.REGISTRY }}/skymap-frontend:${{ github.sha }}

      - name: Configure kubectl
        uses: ./.github/actions/setup-kubectl
        with:
          sa-key: ${{ secrets.YC_SA_KEY_JSON }}
          cluster-id: ${{ env.K8S_CLUSTER_ID }}

      - name: Deploy
        run: |
          kubectl apply -f k8s/base/frontend/
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/skymap-frontend:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Verify
        run: |
          for i in $(seq 1 5); do
            curl -sf https://skymap-app.afsh.space/ && exit 0
            sleep 5
          done
          exit 1
