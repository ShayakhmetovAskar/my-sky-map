server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://vite_frontend_dev:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Solver API
    location /api/v1/submissions {
        proxy_pass http://solver_api_dev:8000/submissions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/tasks {
        proxy_pass http://solver_api_dev:8000/tasks;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/healthcheck {
        proxy_pass http://solver_api_dev:8000/healthcheck;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/stars {
        proxy_pass http://solver_api_dev:8000/stars;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
